# Daleks Configuration Example
# Copy this file to config.toml and adjust to your environment.

# IP addresses or CIDR networks allowed to submit emails.
# Requests from any other IP are rejected with HTTP 403.
allowed_networks = [
    "127.0.0.1/32",
    "::1/128",
    # "10.0.0.0/8",
    # "192.168.0.0/24",
]

# Maximum number of messages each per-SMTP queue may hold before new
# submissions are rejected with HTTP 429.  Set to 0 for unlimited.
queue_max_size = 1000

# Logging level: DEBUG, INFO, WARNING, ERROR
log_level = "INFO"

# ── SMTP accounts ────────────────────────────────────────────────────────────
# Define one [[smtp_accounts]] section per outbound relay.
# Multiple accounts are used in round-robin order when no explicit
# smtp_account is provided in the submission payload.

[[smtp_accounts]]
name     = "primary"
host     = "smtp.example.com"
port     = 587
username = "noreply@example.com"
password = "change-me"
use_tls  = true    # STARTTLS on port 587
use_ssl  = false   # Implicit TLS on port 465 — cannot combine with use_tls
timeout  = 30
workers  = 3       # Parallel senders for this account

[[smtp_accounts]]
name     = "secondary"
host     = "smtp.backup.com"
port     = 465
username = "backup@example.com"
password = "change-me"
use_tls  = false
use_ssl  = true
timeout  = 30
workers  = 2

# ── Error notifications ───────────────────────────────────────────────────────
# When this section is present, Daleks attaches a synchronous SMTPHandler to
# the root logger.  Any ERROR (or higher) log event will trigger an email to
# the listed recipients immediately — no queue, no async overhead.
# Remove or comment-out the entire section to disable error notifications.

# [error_notify]
# host         = "smtp.example.com"
# port         = 587
# from_address = "daleks-errors@example.com"
# to           = ["ops@example.com", "oncall@example.com"]
# subject      = "[Daleks] Application Error"
# username     = "daleks-errors@example.com"
# password     = "change-me"
# use_tls      = true   # STARTTLS; set false for plain / implicit-TLS relay
